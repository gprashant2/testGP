name: Simple CI CD K3s Secure

on:
  push:

jobs:
  build-deploy:
    runs-on: self-hosted

    steps:

    # -----------------------------
    # Checkout Code
    # -----------------------------
    - name: Checkout
      uses: actions/checkout@v4

    # -----------------------------
    # Secret Scan (Gitleaks)
    # -----------------------------
    - name: Run Gitleaks Secret Scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # -----------------------------
    # Trivy Filesystem Scan (Dependencies / Code)
    # -----------------------------
    - name: Trivy FS Scan
      uses: aquasecurity/trivy-action@0.20.0
      with:
        scan-type: 'fs'
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'

    # -----------------------------
    # Authenticate to GCP
    # -----------------------------
    - name: Auth GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    # -----------------------------
    # Setup gcloud
    # -----------------------------
    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    # -----------------------------
    # Configure Docker for GAR
    # -----------------------------
    - name: Configure Docker
      run: |
        gcloud auth configure-docker ${{ secrets.GAR_REGION }}-docker.pkg.dev

    # -----------------------------
    # Build Image
    # -----------------------------
    - name: Build Docker Image
      run: |
        docker build -t \
        ${{ secrets.GAR_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPO }}/simple-app:latest \
        ./app

    # -----------------------------
    # Trivy Image Scan (Container Vulnerabilities)
    # -----------------------------
    - name: Trivy Image Scan
      uses: aquasecurity/trivy-action@0.20.0
      with:
        image-ref: ${{ secrets.GAR_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPO }}/simple-app:latest
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'

    # -----------------------------
    # Push Image
    # -----------------------------
    - name: Push Image
      run: |
        docker push \
        ${{ secrets.GAR_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPO }}/simple-app:latest

    # -----------------------------
    # Setup kubectl
    # -----------------------------
    - name: Setup kubectl
      uses: azure/setup-kubectl@v4

    # -----------------------------
    # Configure kubeconfig
    # -----------------------------
    - name: Setup kubeconfig
      run: |
        echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml
        export KUBECONFIG=$PWD/kubeconfig.yaml
        kubectl get nodes

    # -----------------------------
    # Deploy to K3s
    # -----------------------------
    - name: Deploy
      run: |
        export KUBECONFIG=$PWD/kubeconfig.yaml
        kubectl apply -f k8s/
