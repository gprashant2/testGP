name: Simple CI CD K3s Secure

on:
  push:
    branches: [ main, master ]

jobs:
  build-deploy:
    runs-on: self-hosted

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Run Gitleaks Secret Scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Trivy FS Scan
      uses: aquasecurity/trivy-action@0.20.0
      with:
        scan-type: fs
        format: table
        exit-code: 1
        severity: CRITICAL,HIGH

    - name: Auth GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    - name: Set Project
      run: |
        gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

    - name: Configure Docker
      run: |
        gcloud auth configure-docker ${{ secrets.GAR_REGION }}-docker.pkg.dev

    - name: Build Docker Image
      run: |
        docker build -t \
        ${{ secrets.GAR_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPO }}/simple-app:latest \
        ./app

    - name: Push Image
      run: |
        docker push \
        ${{ secrets.GAR_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPO }}/simple-app:latest

    - name: Trivy Image Scan
      uses: aquasecurity/trivy-action@0.20.0
      with:
        image-ref: ${{ secrets.GAR_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPO }}/simple-app:latest
        format: table
        exit-code: 0
        severity: CRITICAL,HIGH

    - name: Setup kubectl
      uses: azure/setup-kubectl@v4

    - name: Setup kubeconfig
      run: |
        echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml
        export KUBECONFIG=$PWD/kubeconfig.yaml
        kubectl get nodes

    - name: Deploy
      run: |
        export KUBECONFIG=$PWD/kubeconfig.yaml
        kubectl apply -f k8s/
