name: CI CD K3s Multi Env

on:
  push:
    branches: [ prod, dev ]

jobs:

  build:
    runs-on: self-hosted
    steps:

    - uses: actions/checkout@v4

    - uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - uses: aquasecurity/trivy-action@0.20.0
      with:
        scan-type: fs
        exit-code: 1
        severity: CRITICAL,HIGH

    - uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - uses: google-github-actions/setup-gcloud@v2

    - run: gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

    - run: gcloud auth configure-docker ${{ secrets.GAR_REGION }}-docker.pkg.dev


    # ---------------- BUILD DEV ----------------
    - name: Build (Dev)
      if: github.ref == 'refs/heads/dev'
      run: |
        docker build --no-cache -t \
        ${{ secrets.GAR_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPO }}/simple-app:dev ./app

        docker push \
        ${{ secrets.GAR_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPO }}/simple-app:dev


    # ---------------- BUILD PROD ----------------
    - name: Build (Prod)
      if: github.ref == 'refs/heads/prod'
      run: |
        docker build --no-cache -t \
        ${{ secrets.GAR_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPO }}/simple-app:prod ./app

        docker push \
        ${{ secrets.GAR_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPO }}/simple-app:prod


  # ================= DEPLOY DEV =================
  deploy-dev:
    needs: build
    runs-on: self-hosted
    environment: dev
    if: github.ref == 'refs/heads/dev'

    steps:

    - uses: actions/checkout@v4

    # Install Helm (NEW - Minimal Add)
    - name: Setup Helm
      uses: azure/setup-helm@v4

    - uses: azure/setup-kubectl@v4

    - name: Deploy DEV via Helm
      run: |
        echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml
        export KUBECONFIG=$PWD/kubeconfig.yaml

        helm upgrade --install simple-app ./helm/simple-app \
          -f ./helm/simple-app/values-dev.yaml \
          --namespace dev \
          --create-namespace

        kubectl rollout restart deployment simple-app -n dev
  


  # ================= DEPLOY PROD =================
  deploy-prod:
    needs: build
    runs-on: self-hosted
    environment: prod
    if: github.ref == 'refs/heads/prod'

    steps:

    - uses: actions/checkout@v4

    # Install Helm (NEW - Minimal Add)
    - name: Setup Helm
      uses: azure/setup-helm@v4

    - uses: azure/setup-kubectl@v4

    - name: Deploy PROD via Helm
      run: |
        echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml
        export KUBECONFIG=$PWD/kubeconfig.yaml

        helm upgrade --install simple-app ./helm/simple-app \
          -f ./helm/simple-app/values-prod.yaml \
          --namespace prod \
          --create-namespace

        kubectl rollout restart deployment simple-app -n prod
    

  ai-summary:
    needs: build
    runs-on: self-hosted

    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/prod'

    steps:
    - uses: actions/checkout@v4

    - name: AI Deployment Summary
      run: |
        python3 -m pip install requests || true
        python3 scripts/genai_release_summary.py || true
